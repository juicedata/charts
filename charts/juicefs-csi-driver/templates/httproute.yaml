{{- if .Values.dashboard.httpRoute.enabled }}
{{- $root := . }}
{{- $hostnames := (list) }}
{{- if .Values.dashboard.httpRoute.reuseIngressConfiguration }}
  {{- range .Values.dashboard.ingress.hosts }}
    {{- if .host }}
      {{- $hostnames = append $hostnames .host }}
    {{- end }}
  {{- end }}
{{- else }}
  {{- $hostnames = default (list) .Values.dashboard.httpRoute.hostnames }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "juicefs-csi.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "juicefs-csi.labels" . | nindent 4 }}
spec:
  {{- with .Values.dashboard.httpRoute.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  hostnames:
  {{- range $hostnames }}
    - {{ . | quote }}
  {{- end }}
  rules:
{{- if .Values.dashboard.httpRoute.extraRules }}
{{- toYaml .Values.dashboard.httpRoute.extraRules | nindent 2 }}
{{- end }}
  - backendRefs:
    - name: juicefs-csi-dashboard
      port: {{ $root.Values.dashboard.service.port }}
{{- end }}